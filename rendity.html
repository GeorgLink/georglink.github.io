<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:#111827;background:#fff;display:flex;height:100vh;overflow:hidden}
a{color:inherit;text-decoration:none}

/* ── SIDEBAR ── */
.sidebar{width:240px;min-width:240px;height:100vh;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sidebar-logo{padding:20px 16px 14px;font-size:16px;font-weight:700;color:#3B82F6;border-bottom:1px solid #E5E7EB;letter-spacing:-0.3px}
.nav-links{flex:1;overflow-y:auto;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:10px;height:40px;padding:0 16px;cursor:pointer;color:#6B7280;font-size:13px;position:relative;transition:background .1s;user-select:none}
.nav-item:hover{background:#F0F9FF;color:#111827}
.nav-item.active{background:#EFF6FF;color:#1D4ED8;font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#3B82F6;border-radius:0 2px 2px 0}
.nav-item .nav-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item .nav-icon svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.nav-item .nav-badge{margin-left:auto;background:#F3F4F6;color:#9CA3AF;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500}
.nav-section{padding:14px 16px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;color:#9CA3AF;text-transform:uppercase}

/* ── MAIN LAYOUT ── */
.main-wrapper{margin-left:240px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* ── HEADER ── */
.header{height:56px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:relative;z-index:50}
.header-title{font-size:16px;font-weight:500;color:#111827}
.header-right{display:flex;align-items:center;gap:12px}
.avatar{width:32px;height:32px;border-radius:50%;background:#3B82F6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}

/* ── DATE PICKER ── */
.date-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #D1D5DB;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;color:#374151;user-select:none;white-space:nowrap}
.date-chip:hover{border-color:#9CA3AF}
.date-chip .caret{color:#9CA3AF;font-size:10px}
.dp-wrapper{position:relative}
.dp-panel{position:absolute;top:calc(100% + 8px);right:0;width:540px;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:200;border:1px solid #E5E7EB;display:none;overflow:hidden}
.dp-panel.open{display:flex;flex-direction:column}
.dp-body{display:flex;min-height:260px}
.dp-presets{width:165px;min-width:165px;border-right:1px solid #E5E7EB;padding:6px 0;overflow-y:auto;max-height:320px}
.dp-preset-item{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;cursor:pointer;font-size:12px;color:#374151}
.dp-preset-item:hover{background:#F0F9FF}
.dp-preset-item.selected{color:#3B82F6;font-weight:500}
.dp-check{width:12px;color:#3B82F6;font-size:11px}
.dp-custom{flex:1;padding:14px;overflow-y:auto}
.dp-custom-section{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:10px}
.dp-custom-section:first-child{margin-top:0}
.dp-radio-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.dp-radio-row input[type=radio]{accent-color:#3B82F6;cursor:pointer}
.dp-radio-row label{font-size:12px;color:#374151;cursor:pointer;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dp-radio-row input[type=number]{width:46px;padding:3px 6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px;text-align:center}
.dp-period-pills{display:flex;gap:5px;flex-wrap:wrap}
.dp-period-pill{padding:3px 9px;border:1px solid #D1D5DB;border-radius:10px;font-size:11px;cursor:pointer;color:#374151}
.dp-period-pill:hover{border-color:#3B82F6;color:#3B82F6}
.dp-period-pill.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
.dp-actions{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;border-top:1px solid #E5E7EB;background:#FAFAFA}
.btn-cancel{background:none;border:none;cursor:pointer;font-size:13px;color:#6B7280;padding:6px 12px;border-radius:6px}
.btn-cancel:hover{background:#F3F4F6}
.btn-ok{background:#3B82F6;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:13px;cursor:pointer;font-weight:500}
.btn-ok:hover{background:#2563EB}

/* ── PAGE CONTENT ── */
.page-content{flex:1;overflow-y:auto;padding:24px;background:#fff}
.stack{display:flex;flex-direction:column;gap:16px}

/* ── CARDS ── */
.card{background:#F7F8FA;border:1px solid #E5E7EB;border-radius:8px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:500;color:#111827}
.card-subtitle{font-size:12px;color:#9CA3AF}

/* ── STAT CARDS ── */
.stat-card{background:#F7F8FA;border:1px solid #E5E7EB;border-radius:8px;padding:20px;position:relative}
.stat-card.clickable{cursor:pointer}
.stat-card.clickable:hover{background:#F0F9FF}
.stat-label{font-size:12px;color:#6B7280;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:#111827;font-variant-numeric:tabular-nums;line-height:1.1}
.stat-value.sm{font-size:20px}
.stat-value.pos{color:#10B981}
.stat-value.neg{color:#EF4444}
.stat-secondary{font-size:12px;color:#6B7280;margin-top:4px}
.stat-secondary.pos{color:#10B981}
.stat-secondary.neg{color:#EF4444}
.stat-chevron{position:absolute;bottom:14px;right:14px;color:#D1D5DB;font-size:18px}

/* ── GRIDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}

/* ── TOGGLE PILLS ── */
.toggle-group{display:inline-flex;border:1px solid #D1D5DB;border-radius:6px;overflow:hidden}
.toggle-btn{padding:5px 13px;font-size:12px;cursor:pointer;background:#fff;color:#6B7280;border:none;border-right:1px solid #D1D5DB;transition:all .1s;font-family:inherit}
.toggle-btn:last-child{border-right:none}
.toggle-btn.active{background:#3B82F6;color:#fff}
.toggle-btn:hover:not(.active){background:#F9FAFB;color:#111827}

/* ── VIEW SELECTOR ── */
.view-selector{display:inline-flex;border:1px solid #D1D5DB;border-radius:6px;overflow:hidden;margin-bottom:16px}
.view-btn{padding:7px 16px;font-size:13px;cursor:pointer;background:#fff;color:#6B7280;border:none;border-right:1px solid #D1D5DB;transition:all .1s;font-family:inherit}
.view-btn:last-child{border-right:none}
.view-btn.active{background:#3B82F6;color:#fff;font-weight:500}
.view-btn:hover:not(.active){background:#F0F9FF;color:#111827}

/* ── SERIES PILLS ── */
.series-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid #E5E7EB}
.series-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid #D1D5DB;border-radius:12px;font-size:12px;cursor:pointer;background:#fff;user-select:none;transition:all .1s}
.series-pill.active{color:#fff;border-color:transparent}
.s-swatch{width:16px;height:4px;border-radius:2px;flex-shrink:0}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #E5E7EB}
.data-table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
.data-table th{text-align:left;padding:9px 12px;font-size:12px;font-weight:500;color:#6B7280;border-bottom:1px solid #E5E7EB;background:#F9FAFB;position:sticky;top:0;z-index:2;cursor:pointer;white-space:nowrap;user-select:none}
.data-table th:hover{color:#111827}
.data-table th.sorted{color:#3B82F6}
.data-table td{padding:9px 12px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
.data-table tr:hover td{background:#F0F9FF;cursor:pointer}
.data-table .num{text-align:right}
.data-table .pos{color:#10B981}
.data-table .neg{color:#EF4444}
.data-table .muted{color:#9CA3AF;opacity:.6}
.data-table tfoot td{padding:9px 12px;font-weight:600;border-top:2px solid #E5E7EB;background:#F9FAFB}
.table-year-header{background:#F3F4F6 !important;font-weight:600;color:#374151;cursor:pointer}
.table-year-header:hover{background:#E5E7EB !important}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-buy{background:#DBEAFE;color:#1D4ED8}
.badge-sell{background:#FEF3C7;color:#B45309}
.badge-dividend{background:#EDE9FE;color:#6D28D9}
.badge-premium{background:#FEF3C7;color:#D97706}
.badge-expiry{background:#F3F4F6;color:#6B7280}
.badge-exercise{background:#CCFBF1;color:#0F766E}
.badge-assignment{background:#F0FDF4;color:#15803D}
.badge-interest{background:#CCFBF1;color:#0F766E}

/* ── METRIC ROWS ── */
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F3F4F6}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:12px;color:#6B7280}
.metric-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.metric-value.pos{color:#10B981}
.metric-value.neg{color:#EF4444}

/* ── HEATMAP ── */
.hm-table{width:100%;border-collapse:collapse;font-size:10px;font-variant-numeric:tabular-nums}
.hm-table th{padding:3px 2px;font-size:10px;font-weight:500;color:#6B7280;text-align:center}
.hm-table th.yr{text-align:left;padding-right:4px}
.hm-table td{padding:2px}
.hm-cell{display:block;padding:4px 2px;border-radius:3px;text-align:center;min-width:24px}
.hm-pos{background:#D1FAE5;color:#065F46}
.hm-neg{background:#FEE2E2;color:#991B1B}
.hm-strong-pos{background:#10B981;color:#fff}
.hm-strong-neg{background:#EF4444;color:#fff}
.hm-neu{background:#F3F4F6;color:#6B7280}
.hm-empty{color:#D1D5DB}

/* ── CALCULATION SUMMARY TABLE ── */
.calc-table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
.calc-table tr{border-bottom:1px solid #F3F4F6}
.calc-table td{padding:8px 4px}
.calc-table td:last-child{text-align:right;font-weight:500}
.calc-table .total-row td{font-weight:700;border-top:2px solid #E5E7EB;padding-top:10px}

/* ── IRR HEATMAP ROWS ── */
.irr-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.irr-year{font-size:12px;color:#6B7280;width:36px;flex-shrink:0;font-variant-numeric:tabular-nums}
.irr-bar{flex:1;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}

/* ── BACK LINK ── */
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#3B82F6;cursor:pointer;margin-bottom:16px}
.back-link:hover{color:#2563EB;text-decoration:underline}

/* ── IMPORT PAGE ── */
.upload-zone{border:2px dashed #D1D5DB;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .1s}
.upload-zone:hover{border-color:#3B82F6;background:#F0F9FF}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.form-input{width:100%;padding:7px 11px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;color:#111827;font-family:inherit}
.form-input:focus{outline:2px solid #3B82F6;outline-offset:0;border-color:#3B82F6}
.btn-primary{background:#3B82F6;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:500;font-family:inherit}
.btn-primary:hover{background:#2563EB}
.divider{border:none;border-top:1px solid #E5E7EB;margin:24px 0}
.sec-title{font-size:15px;font-weight:600;color:#111827;margin-bottom:4px}
.sec-desc{font-size:13px;color:#6B7280;margin-bottom:16px;line-height:1.5}
.status-box{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:12px 14px;font-size:12px;color:#6B7280;margin-top:12px}

/* ── COMPARISON ── */
.placeholder-card{border:2px dashed #D1D5DB;border-radius:8px;padding:40px 24px;text-align:center}
.placeholder-title{font-size:18px;font-weight:500;color:#111827;margin:16px 0 10px}
.placeholder-text{font-size:13px;color:#6B7280;max-width:480px;margin:0 auto 8px;line-height:1.6}
.blue-link{color:#3B82F6;cursor:pointer;text-decoration:underline}

/* ── BENCHMARK CHIPS ── */
.benchmark-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.benchmark-chips{display:flex;gap:8px;flex-wrap:wrap}
.benchmark-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid #E5E7EB;border-radius:14px;font-size:12px;background:#fff;user-select:none}
.bench-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bench-remove{color:#9CA3AF;cursor:pointer;margin-left:2px;font-size:14px;line-height:1}
.bench-remove:hover{color:#EF4444}
.btn-add-bench{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid #3B82F6;border-radius:6px;font-size:13px;color:#3B82F6;cursor:pointer;background:#fff;white-space:nowrap;font-family:inherit}
.btn-add-bench:hover{background:#EFF6FF}

/* ── CHART CONTAINER ── */
.chart-box{min-height:320px}

/* ── TICKER ── */
.ticker-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.mono{font-family:'Courier New',monospace;font-weight:700}

/* ── MISC ── */
.page-hidden{display:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9CA3AF}
*:focus-visible{outline:2px solid #3B82F6;outline-offset:2px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.mb8{margin-bottom:8px}
.mb16{margin-bottom:16px}
.text-sm{font-size:12px}
.text-muted{color:#6B7280}
.bold{font-weight:600}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════ -->
<nav class="sidebar">
  <div class="sidebar-logo">Rendity</div>
  <div class="nav-links">
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon"><i data-lucide="home"></i></span>Dashboard</div>
    <div class="nav-item" data-page="history"><span class="nav-icon"><i data-lucide="trending-up"></i></span>History</div>
    <div class="nav-item" data-page="holdings"><span class="nav-icon"><i data-lucide="pie-chart"></i></span>Holdings</div>
    <div class="nav-item" data-page="performance"><span class="nav-icon"><i data-lucide="gauge"></i></span>Performance</div>
    <div class="nav-item" data-page="earnings"><span class="nav-icon"><i data-lucide="coins"></i></span>Earnings</div>
    <div class="nav-item" data-page="stocks"><span class="nav-icon"><i data-lucide="table-2"></i></span>Stocks</div>
    <div class="nav-item" data-page="comparison"><span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>Comparison <span class="nav-badge">Coming soon</span></div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" data-page="import"><span class="nav-icon"><i data-lucide="upload"></i></span>Import Data</div>
    <div class="nav-item" data-page="settings"><span class="nav-icon"><i data-lucide="settings"></i></span>Settings</div>
  </div>
</nav>

<!-- ══════════════════════════════════════════
     MAIN WRAPPER
══════════════════════════════════════════ -->
<div class="main-wrapper">

  <!-- HEADER -->
  <header class="header">
    <span class="header-title" id="headerTitle">Dashboard</span>
    <div class="header-right">
      <div class="dp-wrapper">
        <div class="date-chip" id="dateChipBtn">
          <span>📅</span>
          <span id="dateChipLabel">All Time</span>
          <span class="caret" id="dateCaret">▼</span>
        </div>
        <div class="dp-panel" id="dpPanel">
          <div class="dp-body">
            <!-- Presets -->
            <div class="dp-presets" id="dpPresets"></div>
            <!-- Custom -->
            <div class="dp-custom">
              <div class="dp-custom-section">Custom Range</div>
              <div class="dp-radio-row"><input type="radio" name="dpmode" id="r1" checked><label for="r1">Last <input type="number" value="1" min="1" style="width:40px"> <select style="border:1px solid #D1D5DB;border-radius:4px;font-size:12px;padding:2px 4px"><option>Years</option><option>Months</option></select></label></div>
              <div class="dp-radio-row"><input type="radio" name="dpmode" id="r2"><label for="r2">Last <input type="number" value="90" min="1" style="width:46px"> Days</label></div>
              <div class="dp-radio-row"><input type="radio" name="dpmode" id="r4"><label for="r4">From <input type="text" placeholder="MM/DD/YYYY" style="width:96px"> to <input type="text" placeholder="MM/DD/YYYY" style="width:96px"> <span style="font-size:11px;color:#9CA3AF">(excl.)</span></label></div>
              <div class="dp-radio-row"><input type="radio" name="dpmode" id="r5"><label for="r5">Since <input type="text" placeholder="MM/DD/YYYY" style="width:96px"> <span style="font-size:11px;color:#9CA3AF">(excl.)</span></label></div>
              <div class="dp-radio-row"><input type="radio" name="dpmode" id="r6"><label for="r6">Year <select style="border:1px solid #D1D5DB;border-radius:4px;font-size:12px;padding:2px 4px"><option>2024</option><option>2023</option><option>2022</option><option>2021</option><option>2020</option><option>2019</option></select></label></div>
              <div class="dp-custom-section" style="margin-top:14px">Current Period</div>
              <div class="dp-period-pills">
                <div class="dp-period-pill">Week</div>
                <div class="dp-period-pill">Month</div>
                <div class="dp-period-pill">Quarter</div>
                <div class="dp-period-pill">Year</div>
                <div class="dp-period-pill active">YTD</div>
              </div>
              <div class="dp-custom-section" style="margin-top:14px">Previous Period</div>
              <div class="dp-period-pills">
                <div class="dp-period-pill">Day</div>
                <div class="dp-period-pill">Week</div>
                <div class="dp-period-pill">Month</div>
                <div class="dp-period-pill">Quarter</div>
                <div class="dp-period-pill">Year</div>
              </div>
            </div>
          </div>
          <div class="dp-actions">
            <button class="btn-cancel" id="dpCancel">Cancel</button>
            <button class="btn-ok" id="dpOk">OK</button>
          </div>
        </div>
      </div>
      <div class="avatar">G</div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="page-content" id="pageContent"></main>
</div>

<script>
// ═══════════════════════════════════════════════════
//  MOCK DATA
// ═══════════════════════════════════════════════════
const COLORS = ['#3B82F6','#F59E0B','#10B981','#EF4444','#8B5CF6','#EC4899','#14B8A6','#D97706'];

// Portfolio history (weekly, Mar 2019 – Dec 2024)
// [date, portfolio_value, net_deposits]
const HISTORY = (function(){
  const pts = [
    ['2019-03-01',10000,10000],['2019-06-01',10900,10000],['2019-09-01',11700,12000],
    ['2019-12-01',12400,12000],['2020-03-01',8600,14000],['2020-06-01',10500,14000],
    ['2020-09-01',13200,14000],['2020-12-01',16100,14000],['2021-03-01',19200,16500],
    ['2021-06-01',21800,16500],['2021-09-01',23500,19000],['2021-12-01',25800,19000],
    ['2022-03-01',22400,22000],['2022-06-01',17900,24500],['2022-09-01',19100,27000],
    ['2022-12-01',21200,29000],['2023-03-01',24500,29000],['2023-06-01',28300,31000],
    ['2023-09-01',31000,33500],['2023-12-01',35600,35000],['2024-03-01',40200,35500],
    ['2024-06-01',47500,36500],['2024-09-01',53800,37000],['2024-12-01',58967,37410]
  ];
  // Interpolate to weekly
  const result = {dates:[],values:[],deposits:[]};
  for(let i=0;i<pts.length-1;i++){
    const [d1,v1,dep1]=pts[i], [d2,v2,dep2]=pts[i+1];
    const start=new Date(d1), end=new Date(d2);
    const days=(end-start)/(1000*86400);
    const steps=Math.round(days/7);
    for(let s=0;s<steps;s++){
      const t=s/steps;
      const nd=new Date(start); nd.setDate(nd.getDate()+s*7);
      result.dates.push(nd.toISOString().split('T')[0]);
      // add some noise
      const noise=(Math.sin(s*2.3+i*7)*0.015+Math.sin(s*0.7+i*3)*0.01);
      result.values.push(Math.round(v1+(v2-v1)*t*(1+noise)));
      result.deposits.push(Math.round(dep1+(dep2-dep1)*t));
    }
  }
  result.dates.push('2024-12-01');
  result.values.push(58967);
  result.deposits.push(37410);
  return result;
})();

function fmt(n,digits=0){if(n==null)return'';return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:digits,maximumFractionDigits:digits}).format(n)}
function fmtAbbr(n){if(n==null)return'';const abs=Math.abs(n);const sign=n<0?'−':'';if(abs>=1e6)return sign+'$'+(abs/1e6).toFixed(1)+'M';if(abs>=1e3)return sign+'$'+(abs/1e3).toFixed(1)+'K';return fmt(n)}
function fmtPct(n,digits=1){if(n==null)return'';const sign=n>0?'+':'';return sign+n.toFixed(digits)+'%'}
function colorClass(n){return n>0?'pos':n<0?'neg':''}
function makeId(){return 'c'+Math.random().toString(36).slice(2,8)}

let currentDateLabel = 'All Time';

function initDatePicker(){
  const container=document.getElementById('dpPresets');
  DP_PRESETS.forEach(p=>{
    const el=document.createElement('div');
    el.className='dp-preset-item'+(p===currentDateLabel?' selected':'');
    el.innerHTML=`<span class="dp-check">${p===currentDateLabel?'✓':''}</span>${p}`;
    if(p==='Manage…')el.style.color='#9CA3AF';
    el.addEventListener('click',()=>{
      if(p==='Manage…'||p==='Custom…'){
        document.querySelectorAll('.dp-preset-item').forEach(x=>{x.classList.remove('selected');x.querySelector('.dp-check').textContent=''});
        el.classList.add('selected');el.querySelector('.dp-check').textContent='✓';
        return;
      }
      currentDateLabel=p;
      document.getElementById('dateChipLabel').textContent=p;
      document.querySelectorAll('.dp-preset-item').forEach(x=>{x.classList.remove('selected');x.querySelector('.dp-check').textContent=''});
      el.classList.add('selected');el.querySelector('.dp-check').textContent='✓';
      closeDP();
    });
    container.appendChild(el);
  });

  document.getElementById('dateChipBtn').addEventListener('click',e=>{e.stopPropagation();toggleDP()});
  document.getElementById('dpCancel').addEventListener('click',closeDP);
  document.getElementById('dpOk').addEventListener('click',()=>{
    const sel=document.querySelector('.dp-preset-item.selected');
    if(sel)document.getElementById('dateChipLabel').textContent=sel.querySelector('.dp-check').nextSibling.textContent.trim();
    closeDP();
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.dp-wrapper'))closeDP()});
  document.querySelectorAll('.dp-period-pill').forEach(p=>p.addEventListener('click',function(){
    document.querySelectorAll('.dp-period-pill').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  }));
}
function toggleDP(){const p=document.getElementById('dpPanel');p.classList.toggle('open')}
function closeDP(){document.getElementById('dpPanel').classList.remove('open')}

}

const PAGE_TITLES={dashboard:'Dashboard',history:'History',holdings:'Holdings',performance:'Performance',earnings:'Earnings',stocks:'Stocks',comparison:'Comparison','import':'Import Data',settings:'Settings'};

function getRoute(){
  const h=location.hash.replace('#','');
  if(h.startsWith('stocks/'))return{page:'stocks',ticker:h.split('/')[1]};
  return{page:h||'dashboard',ticker:null};
}

function navigate(page,ticker=null){
  location.hash=ticker?`stocks/${ticker}`:page;
}

function render(){
  const {page,ticker}=getRoute();
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
  const title=ticker?`${ticker} — ${(HOLDINGS.find(h=>h.ticker===ticker)||{name:ticker}).name}`:PAGE_TITLES[page]||page;
  document.getElementById('headerTitle').textContent=title;
  const content=document.getElementById('pageContent');
  content.innerHTML='';

  switch(page){
    case'dashboard':   renderDashboard(content); break;
    case'history':     renderHistory(content);   break;
    case'holdings':    renderHoldings(content);  break;
    case'performance': renderPerformance(content);break;
    case'earnings':    renderEarnings(content);  break;
    case'stocks':      ticker?renderStockDetail(content,ticker):renderStocksList(content); break;
    case'comparison':  renderComparison(content);break;
    case'import':      renderImport(content);    break;
    case'settings':    renderSettings(content);  break;
    default:           renderDashboard(content);
  }
  updateDateChipState(page);
  if(typeof lucide!=='undefined') lucide.createIcons();
}

window.addEventListener('hashchange',render);

      this.classList.toggle('active');
      this.style.background=s.active?s.color:'';
      this.style.color=s.active?'#fff':'';
      renderHistoryChart(chartId,seriesDef);
    });
    pillsEl.appendChild(p);
  });

  setTimeout(()=>renderHistoryChart(chartId,seriesDef),50);
}

function renderHistoryChart(chartId,seriesDef){
  const d=HISTORY;
  const seriesData={
    value: d.values,
    dep:   d.deposits,
    earn:  d.values.map((v,i)=>v-d.deposits[i]),
    gains: d.values.map((v,i)=>Math.max(0,v-d.deposits[i])*0.72),
    div:   d.values.map((v,i)=>Math.max(0,v-d.deposits[i])*0.15),
    prem:  d.values.map((v,i)=>Math.max(0,v-d.deposits[i])*0.18),
    int:   d.values.map((v,i)=>Math.max(0,v-d.deposits[i])*0.05),
  };
  const traces=seriesDef.filter(s=>s.active).map(s=>({
    x:d.dates, y:seriesData[s.key],
    name:s.label,
    line:{color:s.color,dash:s.dash,width:2},
    mode:'lines',
    hovertemplate:'%{y:$,.0f}<extra>'+s.label+'</extra>',
  }));
  Plotly.newPlot(chartId,traces,{
    ...PLOTLY_LAYOUT_BASE,
    margin:{l:65,r:16,t:8,b:40},
    yaxis:{...Y_CURRENCY},
    showlegend:false,
  },PLOTLY_CONFIG);
}

function renderMonthlyEarningsTable(){
  const months=['J','F','M','A','M','J','J','A','S','O','N','D'];
  let html=`<table class="hm-table"><thead><tr><th class="yr">Yr</th>${months.map(m=>`<th>${m}</th>`).join('')}<th style="font-weight:700">Tot</th></tr></thead><tbody>`;
  Object.entries(MONTHLY_EARNINGS).forEach(([yr,vals])=>{
    const total=vals.reduce((a,b)=>a+b,0);
    html+=`<tr><td class="yr" style="font-weight:500;font-size:11px;color:#374151">'${yr.slice(2)}</td>`;
    vals.forEach(v=>{
      const cls=v>80?'hm-strong-pos':v>30?'hm-pos':v>0?'hm-neu':'hm-empty';
      html+=`<td><span class="hm-cell ${cls}">${v>0?(v>=1000?(v/1000).toFixed(1)+'k':v):'—'}</span></td>`;
    });
    html+=`<td><span class="hm-cell hm-pos" style="font-weight:700">${total}</span></td></tr>`;
  });
  html+=`</tbody></table>`;
  return html;
}

function renderMonthlyIRRTable(){
  const months=['J','F','M','A','M','J','J','A','S','O','N','D'];
  let html=`<table class="hm-table"><thead><tr><th class="yr">Yr</th>${months.map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody>`;
  Object.entries(MONTHLY_IRR).forEach(([yr,vals])=>{
    html+=`<tr><td class="yr" style="font-weight:500;font-size:11px;color:#374151">'${yr.slice(2)}</td>`;
    vals.forEach(v=>{
      if(v===null){html+=`<td><span class="hm-cell hm-empty">—</span></td>`;return}
      const cls=v>=5?'hm-strong-pos':v>=2?'hm-pos':v>=-2?'hm-neu':v>=-5?'hm-neg':'hm-strong-neg';
      html+=`<td><span class="hm-cell ${cls}">${v>0?'+'+v.toFixed(1):v.toFixed(1)}</span></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  return html;
}

function renderStockDetail(el,ticker){
  const h=HOLDINGS.find(x=>x.ticker===ticker);
  const name=h?h.name:ticker;
  const txs=TRANSACTIONS.filter(t=>t.ticker===ticker);
  const stockData=STOCKS_WITH_DATA.find(s=>s.ticker===ticker)||{};
  const years=[2019,2020,2021,2022,2023,2024];
  const totalEarned=years.reduce((a,y)=>a+(stockData[y]||0),0);
  const totalDiv=txs.filter(t=>t.type==='Dividend').reduce((a,t)=>a+t.amount,0);
  const totalPrem=txs.filter(t=>t.type==='Option Premium').reduce((a,t)=>a+t.amount,0);
  const totalInt=txs.filter(t=>t.type==='Interest').reduce((a,t)=>a+t.amount,0);
  const totalGains=totalEarned-totalDiv-totalPrem-totalInt;
  const ganttId=makeId(), earningsId=makeId();
  const periods=STOCK_HOLDING_PERIODS[ticker.replace('.','_')]||[];

  // Group transactions by year
  const byYear={};
  txs.forEach(t=>{if(!byYear[t.year])byYear[t.year]=[];byYear[t.year].push(t)});
  const yearsSorted=Object.keys(byYear).sort((a,b)=>b-a);

  el.innerHTML=`
  <div class="stack">
    <a class="back-link" onclick="navigate('stocks')">← All Stocks</a>

    <!-- Charts row -->
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">Ownership Timeline</span></div>
        <div id="${ganttId}" style="min-height:200px"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Earnings Breakdown by Year</span></div>
        <div id="${earningsId}" style="min-height:200px"></div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid-5">
      <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-value sm ${totalEarned>0?'pos':'neg'}">${totalEarned>0?'+':''}${fmt(totalEarned)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Dividends</div><div class="stat-value sm pos">+${fmt(totalDiv)}</div></div>
      <div class="stat-card"><div class="stat-label">Option Premiums</div><div class="stat-value sm pos">+${fmt(totalPrem)}</div></div>
      <div class="stat-card"><div class="stat-label">Interest</div><div class="stat-value sm ${totalInt>0?'pos':'neg'}">${totalInt>0?'+':''}${fmt(totalInt)}</div></div>
      <div class="stat-card"><div class="stat-label">Realised Gains</div><div class="stat-value sm ${totalGains>0?'pos':'neg'}">${totalGains>0?'+':''}${fmt(totalGains)}</div></div>
    </div>

    <!-- Transaction table -->
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Description</th>
          <th class="num">Qty</th><th class="num">Price</th>
          <th class="num">Amount</th><th class="num">Fees</th>
        </tr></thead>
        <tbody>
          ${yearsSorted.map(yr=>{
            const yTxs=byYear[yr];
            const yTotal=yTxs.reduce((a,t)=>a+t.amount,0);
            return`
            <tr class="table-year-header" onclick="toggleYearGroup(this,'yg${yr}${earningsId}')">
              <td colspan="6" style="color:#374151;font-size:12px">${yr}</td>
              <td class="num ${yTotal>0?'pos':'neg'}">${fmt(yTotal)}</td>
            </tr>
            ${yTxs.map(t=>`
            <tr class="yg${yr}${earningsId}">
              <td style="white-space:nowrap;color:#6B7280">${formatDate(t.date)}</td>
              <td><span class="badge badge-${t.type.toLowerCase().replace(/ /g,'').replace('premium','premium')}">${t.type}</span></td>
              <td style="max-width:260px;font-size:12px">${t.desc}</td>
              <td class="num">${t.qty!=null?t.qty:'—'}</td>
              <td class="num">${t.price?fmt(t.price,2):'—'}</td>
              <td class="num ${t.amount>0?'pos':'neg'}">${t.amount>0?'+':''}${fmt(t.amount,0)}</td>
              <td class="num ${t.fees?'neg':''}">${t.fees?fmt(t.fees,2):'—'}</td>
            </tr>`).join('')}`;
          }).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="5">Period Total</td>
          <td class="num ${txs.reduce((a,t)=>a+t.amount,0)>0?'pos':'neg'}">${fmt(txs.reduce((a,t)=>a+t.amount,0))}</td>
          <td class="num neg">−${fmt(txs.reduce((a,t)=>a+t.fees,0),2)}</td>
        </tr></tfoot>
      </table>
    </div>
    <div style="text-align:center;color:#9CA3AF;font-size:12px;padding:8px 0">No further transactions in the selected period.</div>
  </div>`;

  // Gantt chart
  setTimeout(()=>{
    if(periods.length===0){
      document.getElementById(ganttId).innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:160px;color:#9CA3AF;font-size:13px">No holding periods in selected range</div>';
    } else {
      const today='2024-12-01';
      const shapes=periods.map((p,i)=>({
        type:'rect',x0:p.from,x1:p.to||today,y0:i-0.4,y1:i+0.4,
        fillcolor:h?h.color+'BB':'#3B82F6BB',line:{width:0},
      }));
      const annotations=periods.map((p,i)=>({
        x:p.from,y:i,text:` ${p.shares} sh @ ${fmt(p.avgCost,0)}`,showarrow:false,
        xanchor:'left',font:{size:10,color:'#fff'},
      }));
      Plotly.newPlot(ganttId,[{x:[periods[0].from,'2024-12-01'],y:[0,periods.length-1],mode:'markers',marker:{opacity:0},hoverinfo:'skip'}],{
        paper_bgcolor:'#F7F8FA',plot_bgcolor:'#F7F8FA',
        margin:{l:10,r:10,t:10,b:30},shapes,annotations,
        xaxis:{showgrid:false,color:'#9CA3AF',tickfont:{size:10}},
        yaxis:{showgrid:false,showticklabels:false,zeroline:false},
        showlegend:false,font:{family:'system-ui'},
        height:160+periods.length*40,
      },PLOTLY_CONFIG);
    }

    // Earnings bar chart
    const earningsYears=years.filter(y=>stockData[y]);
    if(earningsYears.length===0){
      document.getElementById(earningsId).innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#9CA3AF;font-size:13px">No earnings data</div>';
    } else {
      Plotly.newPlot(earningsId,[
        {type:'bar',name:'Dividends',   x:earningsYears,y:earningsYears.map(y=>Math.round((stockData[y]||0)*0.12)),marker:{color:'#8B5CF6'}},
        {type:'bar',name:'Premiums',    x:earningsYears,y:earningsYears.map(y=>Math.round((stockData[y]||0)*0.25)),marker:{color:'#F59E0B'}},
        {type:'bar',name:'Realised',    x:earningsYears,y:earningsYears.map(y=>Math.round((stockData[y]||0)*0.63)),marker:{color:'#10B981'}},
      ],{
        barmode:'stack',paper_bgcolor:'#F7F8FA',plot_bgcolor:'#F7F8FA',
        margin:{l:55,r:10,t:10,b:35},
        xaxis:{showgrid:false,color:'#9CA3AF',tickfont:{size:11}},
        yaxis:{...Y_CURRENCY},
        showlegend:true,legend:{orientation:'h',x:0,y:-0.25,font:{size:11}},
        font:{family:'system-ui'},
      },PLOTLY_CONFIG);
    }
  },50);
}

window.toggleYearGroup=function(headerRow,cls){
  document.querySelectorAll('.'+cls).forEach(r=>{
    r.style.display=r.style.display==='none'?'':'none';
  });
};

function formatDate(d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y,m,day]=d.split('-');
  return`${months[+m-1]} ${+day}, ${y}`;
}

// Badge class helper
function badgeClass(type){
  const map={'Buy':'buy','Sell':'sell','Dividend':'dividend','Option Premium':'premium','Option Expiry':'expiry','Option Exercise':'exercise','Option Assignment':'assignment','Interest':'interest'};

}

//  SORT TABLE (basic)
// ═══════════════════════════════════════════════════
window.sortTable=function(th,colIdx){
  const table=th.closest('table');
  const tbody=table.querySelector('tbody');
  const rows=Array.from(tbody.querySelectorAll('tr'));
  const asc=th.dataset.sort!=='asc';
  th.dataset.sort=asc?'asc':'desc';
  table.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  th.classList.add('sorted');
  rows.sort((a,b)=>{
    const av=a.cells[colIdx]?.textContent.replace(/[$,%+]/g,'').trim()||'';
    const bv=b.cells[colIdx]?.textContent.replace(/[$,%+]/g,'').trim()||'';
    const an=parseFloat(av),bn=parseFloat(bv);
    if(!isNaN(an)&&!isNaN(bn))return asc?an-bn:bn-an;
    return asc?av.localeCompare(bv):bv.localeCompare(av);
  });
  rows.forEach(r=>tbody.appendChild(r));
};
